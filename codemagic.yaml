workflows:
  build-dylib:
    name: Build TurathGate.dylib
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Build dylib
        script: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -arch arm64 -isysroot "$SDK" -miphoneos-version-min=14.0 -fobjc-arc -fmodules -framework UIKit -framework Foundation -dynamiclib -install_name "@rpath/TurathGate.dylib" -o TurathGate.dylib TurathGate.m
    artifacts:
      - TurathGate.dylib
